<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPython IDE</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <!-- Monaco Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <div class="container">
    <!-- Left: OpenClaw Session -->
    <div class="panel left-panel">
      <div class="panel-header">
        <span class="panel-title">🤖 OpenClaw AI 助手</span>
        <button id="openclow-url-btn" class="btn-small">设置</button>
      </div>
      <div class="panel-content" id="openclaw-container">
        <webview id="openclaw-frame" src="http://localhost:18789"></webview>
      </div>
    </div>

    <!-- Right: Top/Bottom panels -->
    <div class="panel right-panels">
      <!-- Top: Editor / Diagram (Tab) -->
      <div class="panel top-panel">
        <div class="panel-header">
          <div class="tab-buttons">
            <button class="tab-btn active" data-tab="editor">📝 代码</button>
            <button class="tab-btn" data-tab="diagram">📋 硬件图</button>
          </div>
          <div class="panel-controls editor-controls">
            <button id="open-file-btn" class="btn-small">打开</button>
            <button id="save-file-btn" class="btn-small">保存</button>
            <button id="upload-file-btn" class="btn-small btn-primary">上传</button>
            <button id="run-demo-btn" class="btn-small btn-primary">运行</button>
          </div>
          <div class="panel-controls diagram-controls hidden">
            <select id="board-select" class="select-small">
              <option value="mpython-v3">MPython V3</option>
              <option value="ledo-2.0">Ledo 2.0</option>
            </select>
            <button id="load-diagram-btn" class="btn-small">加载</button>
          </div>
        </div>
        <div class="panel-content">
          <div id="editor-panel" class="tab-panel">
            <div id="code-editor-container"></div>
          </div>
          <div id="diagram-panel" class="tab-panel hidden">
            <div id="diagram-container">
              <div class="diagram-placeholder">
                <p>📷 点击"加载"选择硬件图</p>
                <p class="hint">或拖放图片到此处</p>
              </div>
              <img id="diagram-image" class="diagram-image hidden" alt="硬件图">
              <canvas id="sensor-overlay" class="sensor-overlay hidden"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="splitter" id="splitter"></div>

      <!-- Bottom: REPL Terminal -->
      <div class="panel bottom-panel">
        <div class="panel-header">
          <span class="panel-title">🖥️ REPL 终端</span>
          <div class="panel-controls">
            <select id="port-select" class="select-small">
              <option value="">-- 端口 --</option>
            </select>
            <select id="baud-select" class="select-small">
              <option value="115200">115200</option>
              <option value="57600">57600</option>
              <option value="9600">9600</option>
            </select>
            <button id="connect-btn" class="btn-small btn-primary">连接</button>
            <button id="clear-terminal-btn" class="btn-small">清除</button>
          </div>
        </div>
        <div id="terminal-container" class="panel-content"></div>
      </div>
    </div>
  </div>

  <!-- 设置模态框 -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>OpenClaw 设置</h3>
        <button class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <label>
          OpenClaw URL:
          <input type="text" id="openclaw-url-input" value="http://localhost:18789" class="input-full">
        </label>
      </div>
      <div class="modal-footer">
        <button id="save-settings-btn" class="btn-small btn-primary">保存</button>
        <button id="cancel-settings-btn" class="btn-small">取消</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
